<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>崔崔，生日快乐！🎁 专属美学空间</title>
    <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Pacifico&family=ZCOOL+KuaiLe&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --pink: #ff8fa3;
            --blue: #a2d2ff;
            --yellow: #ffd166;
            --text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* 锁死滚动条，保持全屏展示 */
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            overflow: hidden; background: #fff5f7;
            position: fixed;
        }
        
        body {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            perspective: 2500px; display: flex;
            justify-content: center; align-items: center;
        }

        /* ================= 飘落的照片卡片 ================= */
        #falling-cards-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 10; overflow: hidden;
            transition: all 1.5s ease;
        }
        body.is-open #falling-cards-container { opacity: 0.85; }

        .falling-card {
            position: absolute; top: -400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 10px 30px 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            border-radius: 8px; animation: driftDown linear forwards;
        }
        .falling-card img {
            width: 100%; height: auto;
            border-radius: 4px; display: block;
        }
        @keyframes driftDown {
            0% { transform: translateY(0) rotate(var(--rot-start)); opacity: 0; }
            10% { opacity: var(--max-opacity); } 
            80% { opacity: var(--max-opacity); }
            100% { transform: translateY(130vh) rotate(var(--rot-end)); opacity: 0; } 
        }

        /* ================= 背景多图轮播 ================= */
        .photo-stream-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; overflow: hidden; opacity: 0; transition: opacity 2.5s ease;
        }
        .photo-item {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.1);
            width: 100%; height: 100%; background-size: cover; background-position: center;
            filter: blur(3px) brightness(0.85); opacity: 0; transition: opacity 2s ease-in-out;
        }
        .photo-item.active { opacity: 1; }
        .photo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0) 20%, rgba(255,245,247,0.7) 100%);
            z-index: -1; opacity: 0; transition: opacity 2.5s ease;
        }

        /* ================= 灵动气球 ================= */
        .balloons-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 5;
        }
        .balloon { position: absolute; bottom: -280px; animation: floatUp var(--dur) infinite ease-in var(--delay); }
        .balloon-body {
            width: 70px; height: 85px; background: hsl(var(--hue), 85%, 82%);
            border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
            box-shadow: inset -6px -6px 15px rgba(0,0,0,0.1); position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        .char-img {
            width: 45px; height: 45px; opacity: 0.7; 
            mix-blend-mode: multiply; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }
        .balloon-ribbon {
            position: absolute; top: 100%; left: 50%; width: 2px; height: 70px;
            background: rgba(255,255,255,0.4); transform-origin: top;
            animation: ribbonSway 3s infinite ease-in-out alternate;
        }
        @keyframes ribbonSway { from { transform: rotate(-20deg); } to { transform: rotate(20deg); } }

        /* ================= 3D 玻璃贺卡主体 (自适应屏幕核心) ================= */
        .scene {
            position: absolute; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center;
            z-index: 20; opacity: 0; transform: scale(0.6) rotateX(-20deg);
            pointer-events: none; transition: all 1.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .card {
            position: relative; 
            width: 90vw; max-width: 480px; /* 适配手机和电脑 */
            height: 88vh; max-height: 820px; /* 核心修改：高度绝对不会超过屏幕的88% */
            background: rgba(255, 255, 255, 0.15); border-radius: 40px;
            backdrop-filter: blur(8px); border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 30px 80px rgba(0,0,0,0.1); transform-style: preserve-3d;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-evenly; /* 核心修改：元素之间自动均匀留白，无需写死margin */
            padding: 3vh 20px;
        }

        .art-title {
            font-family: 'Dancing Script', cursive; 
            font-size: min(3.5rem, 6vh); /* 字体自适应 */
            background: linear-gradient(45deg, #ff6b81, #ffd166);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transform: translateZ(60px); margin: 0;
            text-shadow: 2px 2px 8px rgba(255,255,255,0.8); 
        }

        .bouncing-text { display: flex; gap: 8px; transform: translateZ(80px); justify-content: center; margin: 0; }
        .bouncing-text span {
            display: inline-block; font-size: min(2.8rem, 5vh); color: var(--pink);
            text-shadow: 2px 2px 0px white, 4px 4px 12px rgba(255,143,163,0.8);
            animation: letterBounce 0.6s infinite alternate;
        }

        /* ================= 视频框 (完美竖向 4:3) ================= */
        .video-box {
            height: 38vh; max-height: 380px; /* 以高度为基准，防止撑爆卡片 */
            aspect-ratio: 3 / 4; /* 强制宽3高4 */
            flex-shrink: 0; /* 绝对禁止浏览器挤压视频高度 */
            border-radius: 25px; transform: translateZ(120px);
            overflow: hidden; border: 8px solid rgba(255,255,255,0.9); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.25); background: #000;
        }
        .video-box video { width: 100%; height: 100%; object-fit: cover; }

        /* ================= 底部文字排版 ================= */
        .bottom-text { transform: translateZ(60px); text-align: center; }
        .bottom-text p.wish1 {
            font-family: 'Dancing Script', cursive; font-size: min(1.8rem, 3.5vh); 
            color: #d13a52; line-height: 1.6; text-shadow: 1px 1px 3px rgba(255,255,255,0.8); margin: 0;
        }
        .bottom-text p.wish2 {
            font-size: min(2.4rem, 4.5vh); color: var(--pink); margin: 10px 0 0 0; 
            filter: drop-shadow(0 3px 5px rgba(255,143,163,0.3)); letter-spacing: 2px;
        }

        .action-btn {
            padding: min(12px, 2vh) 40px; background: linear-gradient(135deg, #ff6b81, #ff8fa3); 
            color: white; border: none; border-radius: 50px; cursor: pointer; 
            transform: translateZ(80px); font-size: min(1.3rem, 2.5vh); font-weight: bold; 
            box-shadow: 0 10px 25px rgba(255,107,129,0.4); transition: 0.3s; margin: 0; font-family: inherit;
        }
        .action-btn:hover { transform: translateZ(90px) scale(1.05); }

        /* ================= 封面自适应 ================= */
        .cover {
            position: absolute; z-index: 100; 
            width: 90vw; max-width: 480px; 
            height: 40vh; max-height: 400px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
            border-radius: 35px; box-shadow: 0 20px 60px rgba(255, 143, 163, 0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 1.1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 8px solid #fff; top: 50%; left: 50%; 
            animation: coverFloat 4s ease-in-out infinite;
        }
        
        @keyframes coverFloat {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, calc(-50% - 15px)); }
        }

        @keyframes letterBounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-160vh) rotate(20deg); } }
        
        body.is-open .cover { animation: none; opacity: 0; transform: translate(-50%, -200%) scale(0.1); pointer-events: none; }
        body.is-open .scene, body.is-open .photo-stream-bg, body.is-open .photo-overlay { opacity: 1; }
        body.is-open .scene { transform: scale(1) rotateX(0deg); pointer-events: auto; }
    </style>
</head>
<body>

    <audio id="bgm" src="./happy.mp3" loop></audio>

    <div class="photo-stream-bg" id="photoStream"></div>
    <div class="photo-overlay" id="photoOverlay"></div>
    <div id="falling-cards-container"></div>
    <div class="balloons-container" id="balloons"></div>

    <div class="cover" id="cover" onclick="openCard()">
        <div style="font-size: min(6rem, 12vh); margin-bottom: 2vh; filter: drop-shadow(0 10px 15px rgba(255,107,129,0.3));">🎁</div>
        <h2 style="font-size: min(2.5rem, 5vh); color: #ff6b81; letter-spacing: 2px;">崔崔 专属惊喜</h2>
        <div style="width: 60px; height: 4px; background: linear-gradient(90deg, #ff9a9e, #fecfef); margin: 2vh 0; border-radius: 2px;"></div>
        <p style="color: #777; font-size: min(1.2rem, 2.5vh);">点击开启你的 21 岁生日空间</p>
    </div>

    <div class="scene" id="scene">
        <div class="card" id="card">
            <p class="art-title">Special Memory</p>
            <div class="bouncing-text" id="bounceTitle"></div>
            
            <div class="video-box">
                <video id="myVideo" src="./your-video.mp4" loop muted playsinline></video>
            </div>

            <div class="bottom-text">
                <p class="wish1">愿每一岁的你<br>都有抵挡岁月的勇气和可爱。</p>
                <p class="wish2">🎂 21岁生日快乐，崔崔！🎂</p>
            </div>

            <button class="action-btn" onclick="celebrate()">点亮生日星光 ✨</button>
        </div>
    </div>

    <script>
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
        window.scrollTo(0, 0);

        const cuicuiPhotos = ['./cuicui1.jpg','./cuicui2.jpg','./cuicui3.jpg','./cuicui4.jpg','./cuicui5.jpg','./cuicui6.jpg','./cuicui7.jpg','./cuicui8.jpg','./cuicui9.jpg','./cuicui10.jpg','./cuicui11.jpg','./cuicui12.jpg','./cuicui13.jpg'];

        const titleText = "崔崔生日快乐";
        const bounceContainer = document.getElementById('bounceTitle');
        titleText.split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.innerText = char;
            span.style.animationDelay = `${i * 0.1}s`;
            bounceContainer.appendChild(span);
        });

        const streamContainer = document.getElementById('photoStream');
        cuicuiPhotos.forEach(url => {
            const div = document.createElement('div');
            div.className = 'photo-item';
            div.style.backgroundImage = `url('${url}')`;
            streamContainer.appendChild(div);
        });

        let currentIdx = -1;
        const items = document.querySelectorAll('.photo-item');
        function switchPhoto() {
            if (currentIdx !== -1) items[currentIdx].classList.remove('active');
            currentIdx = Math.floor(Math.random() * items.length);
            items[currentIdx].classList.add('active');
        }

        const dropPhotos = [
            {url: '1.jpg', w: 180}, {url: '2.jpg', w: 200}, {url: '3.jpg', w: 160},
            {url: '4.jpg', w: 190}, {url: '5.jpg', w: 180}, {url: '6.jpg', w: 170}
        ];
        
        let cardSpawnerInterval;
        
        function spawnFallingCard() {
            const container = document.getElementById('falling-cards-container');
            const card = document.createElement('div');
            card.className = 'falling-card';
            
            const randomPhoto = dropPhotos[Math.floor(Math.random() * dropPhotos.length)];
            const startRot = (Math.random() - 0.5) * 40; 
            const endRot = (Math.random() - 0.5) * 100; 
            const duration = 12 + Math.random() * 8; 
            const leftPos = Math.random() * 80 + 5; 
            const scale = 0.7 + Math.random() * 0.5; 
            const opacity = 0.8 + Math.random() * 0.2; 
            
            card.style.width = randomPhoto.w + 'px';
            card.style.left = leftPos + 'vw';
            card.style.transform = `scale(${scale})`;
            card.style.setProperty('--rot-start', startRot + 'deg');
            card.style.setProperty('--rot-end', endRot + 'deg');
            card.style.setProperty('--max-opacity', opacity);
            card.style.animationDuration = duration + 's';
            
            card.innerHTML = `<img src="${randomPhoto.url}" alt="memory">`;
            container.appendChild(card);

            setTimeout(() => { if(card.parentNode) card.parentNode.removeChild(card); }, duration * 1000);
        }

        for(let i = 0; i < 3; i++) setTimeout(spawnFallingCard, i * 1500);
        cardSpawnerInterval = setInterval(spawnFallingCard, 2500);

        const chars = ['1.jpg','https://img.icons8.com/color/144/spongebob-squarepants.png','2.jpg','https://img.icons8.com/color/144/hello-kitty.png','3.jpg','4.jpg','5.jpg','6.jpg'];
        const balloonContainer = document.getElementById('balloons');
        for (let i = 0; i < 15; i++) {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = `${Math.random() * 90}vw`;
            b.style.setProperty('--dur', `${12 + Math.random() * 8}s`);
            b.style.setProperty('--delay', `${Math.random() * 10}s`);
            b.style.setProperty('--hue', Math.random() * 360);
            b.innerHTML = `<div class="balloon-body"><img class="char-img" src="${chars[i % chars.length]}"><div class="balloon-ribbon"></div></div>`;
            balloonContainer.appendChild(b);
        }

        function openCard() {
            window.scrollTo(0, 0); 
            document.body.classList.add('is-open');
            document.getElementById('bgm').play();
            document.getElementById('myVideo').play();
            switchPhoto(); setInterval(switchPhoto, 5000);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function celebrate() {
            var end = Date.now() + (2 * 1000);
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff8fa3', '#ffd166', '#a2d2ff'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff8fa3', '#ffd166', '#a2d2ff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        const scene = document.getElementById('scene');
        const card = document.getElementById('card');
        scene.addEventListener('mousemove', (e) => {
            if (!document.body.classList.contains('is-open')) return;
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
